<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn Page</title>
    <link rel="stylesheet" href="../css/loginPage.css">

</head>
<body>

<section class="header-section">
  <div class="container">
   <header class="main-header">
      <nav class="nav-container" aria-label="Main nav">
       <a href="index.html" class="logo">FinanceHub</a>
        <ul class="nav-links">
          <li><a href="#features" class="nav-link">Features</a></li>
          <li><a href="#about" class="nav-link">About</a></li>
        </ul>
      </nav>
    </header>
  </div> 
</section>

<div class="form-container">
    <div class="hero-text">
      <div class="login-box">
        <form id="loginForm">
          <h2>Login</h2>
          <div class="input-box">
            <input type="text" id="email" required>
            <label for="email">Email / ID</label>
          </div>

          <div class="input-box">
            <input type="password" id="password" required>
            <label for="password">Password</label>
          </div>

          <button type="submit">Login</button>
          <div class="register-link">
            <h4>Create a new account? <a href="registerPage.html">Register</a></h4>
          </div>
        </form>
      </div>
    </div>
</div>

<script>
    // variable for form
    const loginForm = document.getElementById('loginForm');
    
    //action when submit
    loginForm.addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent default form submission
        
        
        const emailValue = document.getElementById('email').value.trim();
        
        // sample log in for admin
        if (emailValue === 'jaydee@wmsu.edu.ph') {
            //temporary password
            window.location.href = '../admin_html/adminPage.html';
        } 
        
        else if(emailValue === 'sam@wmsu.edu.ph') {
            // direct to student view
            window.location.href = '../manager_html/dashboardPage.html';
        }
        else {
            // direct to student view
            window.location.href = '../student_html/mainPage.html';
        }
    });
</script>

</body>
</html>
