<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="../css/registerPage.css">
</head>
<body>

<section class="header-section">
  <div class="container">
   <header class="main-header">
      <nav class="nav-container" aria-label="Main nav">
       <a href="index.html" class="logo">FinanceHub</a>
        <ul class="nav-links">
          <li><a href="#features" class="nav-link">Features</a></li>
          <li><a href="#about" class="nav-link">About</a></li>
        </ul>
      </nav>
    </header>
  </div> 
</section>

     <div class="form-container">
        <div class="hero-text">

          <div class="login-box">
            <form action="../student_html/mainPage.html"">
              <h2>Register</h2>

<div class="input-box">
  <input type="text" id="firstname" required>
  <label for="firstname">Firstname</label>
</div>

<div class="input-box">
  <input type="text" id="" required>
  <label for="middlename">Middlename</label>
</div>

<div class="input-box">
  <input type="text" id="lastname" required>
  <label for="lastname">Lastname</label>
</div>

<div class="input-box">
  <input type="email" id="email" required>
  <label for="email">Email    </label>
</div>

<div class="input-box">
  <input type="text" id="student_id" required>
  <label for="student_id">Student ID</label>
</div>

<div class="input-box">
  <select id="course" required>
    <option value="" disabled selected hidden></option>
    <option>BSIT</option>
    <option>BSCS</option>
    <option>ACT-AD</option>
    <option>ACT-NT</option>
  </select>
  <label for="course">Course</label>
</div>

<div class="input-box">
  <select id="year" required>
    <option value="" disabled selected hidden></option>
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
  </select>
  <label for="Year">Year</label>
</div>

<div class="input-box">
  <input type="password" id="password" required>
  <label for="password">Password</label>
</div>

              <button type="submit">Register</button>
              <div class="register-link">

                <h4>Already have an account? <a href="loginPage.html">Login</a></h4>
              </div>
            </form>
          </div>
        </div>
      </div>


</body>
</html>
