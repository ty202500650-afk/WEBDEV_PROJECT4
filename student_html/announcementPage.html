<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student | Announcements</title>
  <link rel="stylesheet" href="../student_css/announcementPage.css">
</head>
<body>

<div class="container">

  <aside class="sidebar">
    <div class="logo"><h2>STUDENT</h2></div>
    <nav>
      <a href="../student_html/mainPage.html">Dashboard</a>
      <a href="../student_html/budvotePage.html">Budget Voting</a>
      <a  href="../student_html/budgetexpPage.html">Budget History Logs</a>
      <a class="active" href="../student_html/announcementPage.html">Announcements</a>
      <a id="logout-link" href="../html/index.html"><strong>Logout</strong></a>
    </nav>
  </aside>

  <main class="main">

    <div class="out-box">
      <h1> Announcements</h1>
      <button class="refresh-btn" id="refreshBtn">Refresh</button>
    </div>

    <div class="summary">
      <div class="card">
        <p>Total Announcements</p>
        <h2 id="totalAnnouncements">0</h2>
      </div>
      <div class="card">
        <p>New This Week</p>
        <h2 id="newThisWeek">0</h2>
      </div>
      <div class="card">
        <p>Latest Update</p>
        <h2 id="latestDate">---</h2>
      </div>
    </div>

    <div class="announcements-container">
      <h3> Latest Announcements from Student Council</h3>
      <div class="announcements-list" id="announcementsList">
        <div class="empty-message">Loading announcements...</div>
      </div>
    </div>

  </main>

</div>

<script>
  // KEY: Using the SAME 'councilAnnouncements' localStorage key as the admin page
  function loadAnnouncements() {
    const announcements = JSON.parse(localStorage.getItem('councilAnnouncements')) || [];
    
    // Update summary stats
    const total = announcements.length;
    const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
    const newThisWeek = announcements.filter(a => a.timestamp > sevenDaysAgo).length;
    
    document.getElementById('totalAnnouncements').innerText = total;
    document.getElementById('newThisWeek').innerText = newThisWeek;
    
    if (announcements.length > 0) {
      const latest = [...announcements].sort((a, b) => b.timestamp - a.timestamp)[0];
      const latestDate = new Date(latest.date).toLocaleDateString('en-PH');
      document.getElementById('latestDate').innerHTML = latestDate;
    } else {
      document.getElementById('latestDate').innerHTML = '---';
    }
    
    // Render announcements list
    const container = document.getElementById('announcementsList');
    
    if (announcements.length === 0) {
      container.innerHTML = '<div class="empty-message">📭 No announcements yet. Check back later!</div>';
      return;
    }
    
    const sorted = [...announcements].sort((a, b) => b.timestamp - a.timestamp);
    
    let html = '';
    for (let ann of sorted) {
      const categoryClass = getCategoryClass(ann.category);
      const formattedDate = formatDate(ann.date);
      
      html += `
        <div class="announcement-card">
          <div class="announcement-header">
            <span class="announcement-title">${escapeHtml(ann.title)}</span>
            <span class="category-badge ${categoryClass}">${escapeHtml(ann.category)}</span>
          </div>
          <div class="announcement-content">${escapeHtml(ann.content)}</div>
          <div class="announcement-date">
            <span> ${formattedDate}</span>
          </div>
        </div>
      `;
    }
    
    container.innerHTML = html;
  }
  
  function getCategoryClass(category) {
    const classes = {
      'Event': 'category-Event',
      'Meeting': 'category-Meeting',
      'Deadline': 'category-Deadline',
      'Urgent': 'category-Urgent',
      'General': 'category-General'
    };
    return classes[category] || 'category-General';
  }
  
  function formatDate(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);
    
    if (diffMins < 1) return 'Just now';
    if (diffMins < 60) return `${diffMins} minute${diffMins > 1 ? 's' : ''} ago`;
    if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
    if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
    return date.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }
  
  // Load announcements on page load
  loadAnnouncements();
  
  // Refresh button
  document.getElementById('refreshBtn').addEventListener('click', () => {
    loadAnnouncements();
    // Show refresh animation
    const btn = document.getElementById('refreshBtn');
    btn.innerHTML = ' Refreshing...';
    setTimeout(() => {
      btn.innerHTML = ' Refresh';
    }, 500);
  });
  
  // Auto-refresh every 10 seconds to show new announcements from admin
  setInterval(() => {
    loadAnnouncements();
  }, 10000);
</script>

</body>
</html>
